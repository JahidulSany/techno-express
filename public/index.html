<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechnoExpress</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./assets/style.css" />
  </head>

  <body>
    <div class="container" id="auth-container">
      <h2>Register</h2>
      <input type="text" id="username" placeholder="Username" />
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button onclick="register()">Register</button>
      <hr />
      <h2>Login</h2>
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>

    <div class="container hidden" id="app-container">
      <h2>Welcome</h2>
      <button onclick="logout()">Logout</button>
      <hr />
      <h2>Create a Post</h2>
      <input type="text" id="post-title" placeholder="Title" required />
      <textarea id="post-content" placeholder="Content" required></textarea>
      <select name="categories" id="categories" required>
        <option value="1">Web Development</option>
        <option value="2">Artificial Intelligence</option>
        <option value="3">Mobile Development</option>
        <option value="4">Gadgets</option>
        <option value="5">Cybersecurity</option>
        <option value="6">Programming Tips</option>
      </select>
      <br /><br />
      <button onclick="createPost()">Submit Post</button>
      <hr />
      <h2>Blog Posts Categories</h2>
      <div id="posts"></div>
    </div>

    <div class="modal fade" id="editPostModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Post</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editPostForm">
              <input type="hidden" id="editPostId" />
              <div class="text-start mb-3">
                <label class="form-label">Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="modalPostTitle"
                  required
                />
              </div>
              <div class="text-start mb-3">
                <label class="form-label">Content</label>
                <textarea
                  class="form-control"
                  id="modalPostContent"
                  rows="4"
                  required
                ></textarea>
              </div>
              <div class="text-start mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" id="modalCategories" required>
                  <option value="1">Web Development</option>
                  <option value="2">Artificial Intelligence</option>
                  <option value="3">Mobile Development</option>
                  <option value="4">Gadgets</option>
                  <option value="5">Cybersecurity</option>
                  <option value="6">Programming Tips</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              type="button"
              onclick="saveEditedPost()"
              class="btn btn-success"
            >
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>

    <script src="./assets/script.js"></script>
  </body>
</html>
