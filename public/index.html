<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechnoExpress</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./assets/style.css" />
  </head>

  <body>
    <header>
      <nav class="navbar py-3 mb-5 bg-white border-bottom shadow-sm fixed-top">
        <div
          class="container d-flex justify-content-between align-items-center"
        >
          <a
            class="navbar-brand logo fw-bold fs-3 text-primary text-capitalize"
            href="#"
          >
            TechnoExpress
          </a>
        </div>
      </nav>
    </header>
    <main>
      <section class="container section-container my-5" id="auth-container">
        <div class="row justify-content-center">
          <div class="card-shadow col-12 col-md-8 col-lg-5">
            <div class="card border-0 shadow-sm">
              <div class="card-body p-5">
                <!-- Register Section -->
                <h2 class="text-center mb-4 fw-bold">Register</h2>
                <input
                  type="text"
                  id="username"
                  class="form-control mb-3"
                  placeholder="Username"
                />
                <input
                  type="email"
                  id="email"
                  class="form-control mb-3"
                  placeholder="Email"
                />
                <input
                  type="password"
                  id="password"
                  class="form-control mb-3"
                  placeholder="Password"
                />
                <button
                  onclick="register()"
                  class="btn btn-primary w-100 fw-semibold"
                >
                  Register
                </button>

                <hr class="my-5 text-muted" />

                <!-- Login Section -->
                <h2 class="text-center mb-4 fw-bold">Login</h2>
                <input
                  type="email"
                  id="login-email"
                  class="form-control mb-3"
                  placeholder="Email"
                />
                <input
                  type="password"
                  id="login-password"
                  class="form-control mb-3"
                  placeholder="Password"
                />
                <button
                  onclick="login()"
                  class="btn btn-outline-primary w-100 fw-semibold"
                >
                  Login
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section
        class="container section-container hidden my-5"
        id="app-container"
      >
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="h3 mb-0">Welcome</h2>
          <button onclick="logout()" class="btn btn-outline-danger btn-sm">
            Logout
          </button>
        </div>

        <hr class="my-5" />

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h2 class="h4 mb-3">Create a Post</h2>
            <input
              type="text"
              id="post-title"
              class="form-control mb-3"
              placeholder="Title"
              required
            />
            <textarea
              id="post-content"
              class="form-control mb-3"
              rows="4"
              placeholder="Content"
              required
            ></textarea>

            <select
              name="categories"
              id="categories"
              class="form-select mb-4"
              required
            >
              <option value="" selected disabled>Select Category</option>
              <option value="1">Web Development</option>
              <option value="2">Artificial Intelligence</option>
              <option value="3">Mobile Development</option>
              <option value="4">Gadgets</option>
              <option value="5">Cybersecurity</option>
              <option value="6">Programming Tips</option>
            </select>

            <button onclick="createPost()" class="btn btn-success px-4">
              Submit Post
            </button>
          </div>
        </div>

        <hr class="my-5" />

        <h2 class="h4 my-5">Blog Posts Categories</h2>
        <div class="my-5 d-flex flex-wrap gap-2" id="category-filters">
          <button
            type="button"
            class="btn btn-primary rounded-pill px-4 active"
            data-category="all"
          >
            All
          </button>
          <button
            type="button"
            class="btn btn-outline-primary rounded-pill px-4"
            data-category="1"
          >
            Web Development
          </button>
          <button
            type="button"
            class="btn btn-outline-primary rounded-pill px-4"
            data-category="2"
          >
            Artificial Intelligence
          </button>
          <button
            type="button"
            class="btn btn-outline-primary rounded-pill px-4"
            data-category="3"
          >
            Mobile Development
          </button>
          <button
            type="button"
            class="btn btn-outline-primary rounded-pill px-4"
            data-category="4"
          >
            Gadgets
          </button>
          <button
            type="button"
            class="btn btn-outline-primary rounded-pill px-4"
            data-category="5"
          >
            Cybersecurity
          </button>
          <button
            type="button"
            class="btn btn-outline-primary rounded-pill px-4"
            data-category="6"
          >
            Programming Tips
          </button>
        </div>

        <div id="posts" class="my-5 row g-4"></div>
      </section>

      <div
        class="modal fade"
        id="editPostModal"
        tabindex="-1"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Edit Post</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form id="editPostForm">
                <input type="hidden" id="editPostId" />
                <div class="text-start mb-3">
                  <label class="form-label">Title</label>
                  <input
                    type="text"
                    class="form-control"
                    id="modalPostTitle"
                    required
                  />
                </div>
                <div class="text-start mb-3">
                  <label class="form-label">Content</label>
                  <textarea
                    class="form-control"
                    id="modalPostContent"
                    rows="4"
                    required
                  ></textarea>
                </div>
                <div class="text-start mb-3">
                  <label class="form-label">Category</label>
                  <select class="form-select" id="modalCategories" required>
                    <option value="1">Web Development</option>
                    <option value="2">Artificial Intelligence</option>
                    <option value="3">Mobile Development</option>
                    <option value="4">Gadgets</option>
                    <option value="5">Cybersecurity</option>
                    <option value="6">Programming Tips</option>
                  </select>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button
                type="button"
                onclick="saveEditedPost()"
                class="btn btn-success"
              >
                Save Changes
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-white border-top mt-auto py-4 rounded-1">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
      >
        <div class="mb-2 mb-md-0 text-secondary">
          Designed & Developed by
          <a
            class="text-decoration-none fw-bold text-primary"
            href="https://www.linkedin.com/in/jahidul-sany"
            target="_blank"
            >Jahidul Sany</a
          >
        </div>
        <p class="mb-0 text-muted small">
          &copy; <span id="year"></span>
          <span class="fw-semibold">TechnoExpress</span>. All rights reserved.
        </p>
      </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>

    <script src="./assets/script.js"></script>
  </body>
</html>
